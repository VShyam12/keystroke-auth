<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank - Transactions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F5F7FA;
            color: #0A1628;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #0A1628;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 170px;
        }

        .brand-name {
            font-family: 'Playfair Display', Georgia, serif;
            color: #C9A84C;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-links a {
            position: relative;
            color: #FFFFFF;
            text-decoration: none;
            font-size: 14px;
            padding: 4px 0;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 100%;
            height: 2px;
            background: #C9A84C;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.2s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            transform: scaleX(1);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 360px;
            justify-content: flex-end;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #C9A84C;
            color: #0A1628;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-username {
            color: #FFFFFF;
            font-size: 14px;
            max-width: 110px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-gold-link {
            color: #C9A84C;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .logout-btn {
            border: 1px solid #C9A84C;
            color: #C9A84C;
            background: transparent;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .page {
            padding-top: 64px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 24px;
        }

        .page-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 30px;
            color: #0A1628;
            margin-bottom: 6px;
        }

        .page-subtitle {
            color: #6B7280;
            font-size: 13px;
        }

        .statement-btn {
            border: 1px solid #0A1628;
            background: #FFFFFF;
            color: #0A1628;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .filter-card,
        .summary-grid,
        .table-card {
            margin-bottom: 24px;
        }

        .filter-card {
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(10, 22, 40, 0.08);
            padding: 20px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 0.8fr 1.4fr auto;
            gap: 14px;
            align-items: end;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #0A1628;
            margin-bottom: 6px;
        }

        .field input,
        .field select {
            width: 100%;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
            color: #0A1628;
            background: #FFFFFF;
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: #C9A84C;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.08);
        }

        .apply-btn {
            border: none;
            border-radius: 8px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 700;
            color: #0A1628;
            cursor: pointer;
            background: linear-gradient(135deg, #C9A84C, #F0D080);
            height: 44px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .summary-card {
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(10, 22, 40, 0.08);
            padding: 20px;
            border-top: 3px solid transparent;
        }

        .summary-credits {
            border-top-color: #1B8A5A;
        }

        .summary-debits {
            border-top-color: #DC2626;
        }

        .summary-net {
            border-top-color: #C9A84C;
        }

        .summary-label {
            font-size: 12px;
            color: #6B7280;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .summary-value {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .summary-value.credits {
            color: #1B8A5A;
        }

        .summary-value.debits {
            color: #DC2626;
        }

        .summary-value.net {
            color: #0A1628;
        }

        .summary-small {
            font-size: 12px;
            color: #6B7280;
        }

        .table-card {
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(10, 22, 40, 0.08);
            overflow: hidden;
        }

        .table-head {
            background: #0A1628;
            color: #FFFFFF;
        }

        .table-head th {
            text-align: left;
            padding: 16px 20px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        #transactions-tbody tr {
            transition: border-left 0.2s ease, background 0.2s ease;
            border-left: 3px solid transparent;
        }

        #transactions-tbody tr:nth-child(even) {
            background: #F9FAFB;
        }

        #transactions-tbody tr:hover {
            border-left-color: #C9A84C;
            background: #FFFDF5;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .pagination-text {
            color: #6B7280;
            font-size: 13px;
        }

        .page-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .page-btn {
            border: 1px solid #D1D5DB;
            background: #FFFFFF;
            color: #0A1628;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
        }

        .page-btn.active {
            background: #C9A84C;
            color: #0A1628;
            border-color: #C9A84C;
            font-weight: 700;
        }

        @media (max-width: 1100px) {
            .filter-grid {
                grid-template-columns: 1fr 1fr;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 980px) {
            .navbar {
                flex-wrap: wrap;
                height: auto;
                padding: 10px 16px;
                gap: 10px;
            }

            .nav-right,
            .brand {
                min-width: auto;
            }

            .page {
                padding-top: 104px;
            }
        }

        @media (max-width: 820px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="brand">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 1L2 6V12C2 18.63 12 23 12 23S22 18.63 22 12V6L12 1Z" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M12 11L10.5 12.5L12 14L15 11" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <span class="brand-name">SecureBank</span>
        </div>

        <nav class="nav-links">
            <a href="home.html">Home</a>
            <a class="active" href="transactions.html">Transactions</a>
            <a href="transfer.html">Transfer</a>
            <a href="documents.html">Documents</a>
        </nav>

        <div class="nav-right">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M15 17H20L18.6 15.6C18.2 15.2 18 14.67 18 14.1V11C18 7.69 15.31 5 12 5C8.69 5 6 7.69 6 11V14.1C6 14.67 5.78 15.2 5.38 15.6L4 17H9" stroke="#C9A84C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M10 19C10.46 20.18 11.65 21 13 21C14.35 21 15.54 20.18 16 19" stroke="#C9A84C" stroke-width="1.6" stroke-linecap="round"></path>
            </svg>
            <div class="avatar">S</div>
            <span id="nav-username" class="nav-username">Shyam</span>
            <a class="nav-gold-link" href="security_dashboard.html">Security Center</a>
            <button class="logout-btn" type="button" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="page">
        <div class="content">
            <section class="page-header">
                <div>
                    <h1 class="page-title">Transaction History</h1>
                    <div class="page-subtitle">All your account activity</div>
                </div>
                <button class="statement-btn" type="button" onclick="alert('Statement download coming soon')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M12 3V15" stroke="#C9A84C" stroke-width="1.7" stroke-linecap="round"></path>
                        <path d="M8 11L12 15L16 11" stroke="#C9A84C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M5 21H19" stroke="#0A1628" stroke-width="1.7" stroke-linecap="round"></path>
                    </svg>
                    <span>Download Statement</span>
                </button>
            </section>

            <section class="filter-card">
                <div class="filter-grid">
                    <div class="field">
                        <label for="date-from">Date From</label>
                        <input id="date-from" type="date">
                    </div>
                    <div class="field">
                        <label for="date-to">Date To</label>
                        <input id="date-to" type="date">
                    </div>
                    <div class="field">
                        <label for="type-filter">Type</label>
                        <select id="type-filter">
                            <option>All</option>
                            <option>Credit</option>
                            <option>Debit</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="search-input">Search</label>
                        <input id="search-input" type="text" placeholder="Search transactions...">
                    </div>
                    <button class="apply-btn" type="button">Apply Filters</button>
                </div>
            </section>

            <section class="summary-grid">
                <div class="summary-card summary-credits">
                    <div class="summary-label">Total Credits</div>
                    <div id="total-credits" class="summary-value credits">+₹0</div>
                    <div class="summary-small">transactions</div>
                </div>
                <div class="summary-card summary-debits">
                    <div class="summary-label">Total Debits</div>
                    <div id="total-debits" class="summary-value debits">-₹0</div>
                    <div class="summary-small">transactions</div>
                </div>
                <div class="summary-card summary-net">
                    <div class="summary-label">Net Change</div>
                    <div id="net-change" class="summary-value net">₹0</div>
                    <div class="summary-small">This month</div>
                </div>
            </section>

            <section class="table-card">
                <table>
                    <thead class="table-head">
                        <tr>
                            <th>DATE</th>
                            <th>DESCRIPTION</th>
                            <th>CATEGORY</th>
                            <th>AMOUNT</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-tbody"></tbody>
                </table>
            </section>

            <section class="pagination">
                <div class="pagination-text">Showing 1-10 of 10 transactions</div>
                <div class="page-controls">
                    <button class="page-btn" type="button">Previous</button>
                    <button class="page-btn active" type="button">1</button>
                    <button class="page-btn" type="button">2</button>
                    <button class="page-btn" type="button">3</button>
                    <button class="page-btn" type="button">Next</button>
                </div>
            </section>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/session_tracker.js"></script>
    <script>
        (function() {
            var t = sessionStorage.getItem('auth_token');
            if (!t || t === 'null' || t === 'undefined') {
                window.location.replace('login.html');
            }
        })();

        var allTransactions = [];

        function updateSummary(credits, debits) {
            var credEl = document.getElementById('total-credits');
            var debEl = document.getElementById('total-debits');
            var netEl = document.getElementById('net-change');
            if (credEl) credEl.textContent =
                '+₹' + credits.toLocaleString('en-IN');
            if (debEl) debEl.textContent =
                '-₹' + debits.toLocaleString('en-IN');
            if (netEl) netEl.textContent =
                '₹' + (credits - debits).toLocaleString('en-IN');
        }

        function renderTransactions(transactions) {
            var tbody = document.getElementById('transactions-tbody');
            if (!tbody) return;
            tbody.innerHTML = '';

            transactions.forEach(function(tx) {
                var isCredit = tx.amount > 0;
                var amtStr = (isCredit ? '+₹' : '-₹') +
                    Math.abs(tx.amount).toLocaleString('en-IN');

                var categoryColors = {
                    'Income': '#1B8A5A',
                    'Entertainment': '#7C3AED',
                    'Shopping': '#DC2626',
                    'Utilities': '#2563EB',
                    'Food': '#D97706',
                    'Health': '#059669'
                };
                var catColor = categoryColors[tx.category] || '#888';

                var row = document.createElement('tr');
                row.innerHTML =
                    '<td style="color:#888;font-size:13px;padding:16px">' +
                    tx.date + '</td>' +
                    '<td style="color:#0A1628;font-weight:600;font-size:14px;padding:16px">' +
                    tx.description + '</td>' +
                    '<td style="padding:16px"><span style="background:' +
                    catColor + '22;color:' + catColor +
                    ';padding:4px 10px;border-radius:100px;font-size:12px;font-weight:500">' +
                    tx.category + '</span></td>' +
                    '<td style="color:' +
                    (isCredit ? '#1B8A5A' : '#DC2626') +
                    ';font-weight:700;font-size:14px;padding:16px;text-align:right">' +
                    amtStr + '</td>' +
                    '<td style="padding:16px"><span style="background:' +
                    '#1B8A5A22;color:#1B8A5A;padding:4px 10px;border-radius:100px;font-size:12px">' +
                    'Completed</span></td>';
                tbody.appendChild(row);
            });
        }

        window.addEventListener('load', async function() {
            var data = await apiGet('/bank/transactions');
            if (data && data.transactions) {
                allTransactions = data.transactions;
                updateSummary(data.total_credits, data.total_debits);
                renderTransactions(allTransactions);
            }
        });

        document.querySelector('input[placeholder="Search transactions..."]')
            ?.addEventListener('input', function() {
            var query = this.value.toLowerCase();
            var filtered = allTransactions.filter(function(tx) {
                return tx.description.toLowerCase().includes(query) ||
                       tx.category.toLowerCase().includes(query);
            });
            renderTransactions(filtered);
        });

        document.querySelector('select')
            ?.addEventListener('change', function() {
            var type = this.value;
            var filtered = type === 'All' ? allTransactions :
                allTransactions.filter(function(tx) {
                    return type === 'Credit' ? tx.amount > 0 :
                           tx.amount < 0;
                });
            renderTransactions(filtered);
        });
    </script>
</body>
</html>
