<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keystroke Collector Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      line-height: 1.4;
    }

    .row {
      margin-bottom: 1rem;
    }

    input {
      padding: 0.5rem;
      width: 300px;
      max-width: 100%;
    }

    button {
      margin-right: 0.5rem;
      padding: 0.45rem 0.8rem;
      cursor: pointer;
    }

    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="row">
    <label for="password-input">Type your password:</label>
  </div>

  <div class="row">
    <input id="password-input" type="password" autocomplete="off">
  </div>

  <div class="row">
    <button id="show-btn" type="button">Show Features</button>
    <button id="reset-btn" type="button">Reset</button>
  </div>

  <pre id="output"></pre>

  <script src="./keystroke_collector.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var input = document.getElementById('password-input');
      var showBtn = document.getElementById('show-btn');
      var resetBtn = document.getElementById('reset-btn');
      var output = document.getElementById('output');

      var collector = new KeystrokeCollector();
      collector.attach(input);

      showBtn.addEventListener('click', function () {
        var features = collector.getFeatures();
        var summary = collector.getSummary();
        output.textContent = summary + '\n\n' + JSON.stringify(features, null, 2);
      });

      resetBtn.addEventListener('click', function () {
        collector.reset();
        output.textContent = '';
      });
    });
  </script>
</body>
</html>
